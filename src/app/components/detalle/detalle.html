<div class="container mt-5 w-50">
  <h3 class="text-center mb-4">Detalle del Pokemon</h3>

  <div class="card mx-auto p-4 w-50">
    <img [src]="imagen?.other?.dream_world?.front_default" class="card-img-top" alt="Imagen de {{nombre}}">
    <div class="card-body">
      <h3 class="card-title text-center mb-3 text-capitalize">{{nombre}}</h3>
      <p class="card-text">Pokemon nº: {{id}}</p>
      <p class="card-text">Tipo:
        @for (item of tipo; track $index) {
        {{item.type.name}}
        }
      </p>
      <p class="card-text">Altura: {{ (altura || 0) / 10}} m</p>
      <p class="card-text">Peso: {{(peso || 0) / 10}} kg</p>
    </div>
  </div>
</div>
